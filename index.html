<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quran Recitation — Al Khair Primary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0d1b2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 1.5rem;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            color: #c9a84c;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            margin-bottom: 0.3rem;
        }

        header p {
            color: #6b7c93;
            font-size: 0.85rem;
        }

        video {
            width: 100%;
            max-width: 900px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Quran Recitation</h1>
        <p>Al Khair Primary School</p>
    </header>

    <video controls playsinline preload="metadata">
        <source src="https://github.com/mousmaan-dev/akpsc-quran/releases/download/v1.0/quran-video.mp4" type="video/mp4">
    </video>

</body>
</html>
